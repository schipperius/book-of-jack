name: Master Workflow

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set up Python & Sync Data
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run Data Sync Script
        run: |
          pip install pandas
          python scripts/sync_data.py

      - name: 3. Setup Pages Configuration
        uses: actions/configure-pages@v5

      - name: 4. Set up Ruby & Build Site
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: 5. Compile Bootstrap SCSS & Jekyll Site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: 6. Run Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress "./_site/**/*.html"
          fail: false # This stops the deploy if broken links are found!

      - name: 7. Upload Site Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Final Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
