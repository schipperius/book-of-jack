  abstract: >-
    Two main pharaonic roads, the Alamat Tal (Wadi Alamat) Road and Farshût
    Road, cross the Qena Bend between ancient Thebes and the region of Hou,
    providing a desert “shortcut” to the often difficult waters of the Nile, and
    giving Thebes direct access to the shortest route to the southern oases —
    the Girga Road.
