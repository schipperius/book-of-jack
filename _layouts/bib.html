---
<div class="bib-entry">
  <!-- Author and Year -->
  <span class="authors">{{ entry.author }}</span>
  <span class="year">({{ entry.year }}).</span>

  <!-- Title -->
  <span class="title"><strong>{{ entry.title }}</strong>.</span>

  <!-- Journal/Book Title -->
  <span class="journal"><em>{{ entry.journal }}{{ entry.booktitle }}</em>.</span>

  <!-- Links (Only shows if they exist in your BibTeX) -->
  <div class="links">
    {% if entry.doi %}
    <a href="https://doi.org{{ entry.doi }}" target="_blank">[DOI]</a>
    {% endif %}

    {% if entry.url %}
    <a href="{{ entry.url }}" target="_blank">[Web]</a>
    {% endif %}
  </div>
</div>
