{% if page.sources %}
<section class="mt-5 border-top pt-4 px-4 px-md-5">
  <h5 class="text-uppercase small fw-bold tracking-widest text-muted mb-3">
    Sources & Evidence
  </h5>
  <ul class="list-unstyled">
    {% for source in page.sources %}
    <li class="mb-2 small text-secondary">
      <strong class="text-dark">{{ source.title }}:</strong> {{ source.detail }}
    </li>
    {% endfor %}
  </ul>
</section>
{% endif%}
